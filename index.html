<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trợ lý Công chứng AI</title>
<link rel="stylesheet" href="style.css">
</head><body><div class="container"><div class="header">
<h1>⚖️ Trợ lý Công chứng AI</h1>

</div><div class="chat-box" id="chatBox">

Xin chào, tôi là Trợ lý Công chứng AI. Bạn cần hỗ trợ gì?
</div>
</div><div class="input-area">
<textarea
id="question"
placeholder="Nhập câu hỏi pháp lý..."
></textarea><button onclick="askAI()">
Gửi câu hỏi
</button>
</div></div><script src="app.js"></script></body>
</html>
